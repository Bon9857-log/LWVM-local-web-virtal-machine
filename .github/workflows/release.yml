name: Release

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --target-platform android-arm64,android-x64

      - name: Build Linux AppImage
        run: flutter build linux --release

      - name: Build Windows MSIX
        run: |
          flutter build windows --release
          cd windows && msbuild LWVM.sln /p:Configuration=Release /p:Platform=x64

      - name: Create DMG for macOS
        run: |
          brew install create-dmg
          flutter build macos --release
          create-dmg --volname "LWVM" --window-pos 200 120 --window-size 800 400 --icon-size 100 --app-drag-link --icon "lwvm" 120 190 --hide-extension "lwvm.app" build/macos/x64/Release/lwvm.app

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter/apks/app-arm64-release.apk
            build/linux/x64/release/bundle/lwvm-*-linux-x64.AppImage
            build/windows/runner/Release/*.msix
            build/macos/x64/Release/lwvm.dmg
          token: ${{ secrets.GITHUB_TOKEN }}