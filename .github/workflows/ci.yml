name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build linux --debug
      - uses: actions/upload-artifact@v4
        with:
          name: qemu-linux
          path: assets/qemu/linux/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build macos --debug
      - uses: actions/upload-artifact@v4
        with:
          name: qemu-macos
          path: assets/qemu/macos/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build windows --debug
      - uses: actions/upload-artifact@v4
        with:
          name: qemu-windows
          path: assets/qemu/windows/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/action-android-install-ndk@v1
        with:
          ndk-version: '27.0.12097973'
          add-to-path: true
      - name: Build QEMU for Android
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK
          ./scripts/build_qemu_android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: qemu-android
          path: assets/qemu/android/